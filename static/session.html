<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYKAMI NeuroGame</title>

    <link rel="stylesheet" href="/static/style.css">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        /* ==================== GALERÍA ==================== */
        #visual-gallery {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            background-size: cover;
            background-position: center;
            filter: brightness(0.6) blur(2px);
        }

        .slide.active {
            opacity: 0.7;
        }

        /* ==================== CONTENEDOR ==================== */
        #ui-container {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        /* ==================== CÍRCULO ==================== */
        #visual-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid #60a5fa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            transition: all 1.5s ease-in-out;
            box-shadow: 0 0 25px rgba(96,165,250,0.4);
        }

        .inhale {
            transform: scale(1.4);
            background: rgba(96, 165, 250, 0.25);
            box-shadow: 0 0 40px rgba(96,165,250,0.7);
        }

        .exhale {
            transform: scale(0.75);
            background: rgba(239, 68, 68, 0.25);
            box-shadow: 0 0 35px rgba(239,68,68,0.6);
        }

        .hold {
            transform: scale(1.1);
            background: rgba(245, 158, 11, 0.25);
            box-shadow: 0 0 30px rgba(245,158,11,0.6);
        }

        /* ==================== TEXTO ==================== */
        #block {
            max-width: 90%;
            font-size: 1.6rem;
            min-height: 140px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
            line-height: 1.4;
        }

        /* ==================== BOTONES ==================== */
        .controls {
            margin-top: 2rem;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            margin: 5px;
            background: rgba(59, 130, 246, 0.8);
            color: white;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        button:hover {
            background: #2563eb;
            transform: scale(1.05);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            #visual-circle {
                width: 150px;
                height: 150px;
                font-size: 1.2rem;
            }

            #block {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>

    <div id="visual-gallery"></div>

    <div id="ui-container">

        <div id="visual-circle">MAYKAMI</div>

        <div id="block">
            Bienvenido a la Asesoría NeuroGamer
        </div>

        <div class="controls">
            <button id="start-btn">Comenzar Sesión</button>
            <button id="back-btn" style="display:none;">Anterior</button>
            <button id="next-btn" style="display:none;">Siguiente</button>
            <button id="restart-btn" style="display:none;">Reiniciar</button>
        </div>

    </div>

    <!-- 🎧 AUDIO RELAJANTE PROFESIONAL -->
    <audio id="nature-audio" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=deep-relaxation-ambient-110624.mp3" type="audio/mpeg">
    </audio>

    <script src="/static/scripts.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MayKaMi</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Inter',sans-serif;
}

body{

background:#020617;
color:white;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

transition:background 0.5s;

}


/* APP */

#app{

width:95%;
max-width:420px;

background:#020617;

border-radius:20px;

padding:20px;

box-shadow:
0 0 40px black;

text-align:center;

}


/* LOGO */

#logo{
font-size:32px;
font-weight:600;
margin-bottom:5px;
}

#subtitle{
font-size:14px;
opacity:0.7;
margin-bottom:10px;
}


/* NUEVA SESION */

#session-label{

font-size:18px;
margin-bottom:10px;
color:#22c55e;

}


/* TIMER */

#timer{

font-size:22px;
margin-bottom:10px;

}


/* PANEL */

#mental-panel{

background:#000814;
padding:10px;
border-radius:10px;
margin-bottom:10px;

}

.bar{
height:8px;
background:#111;
margin:5px 0;
border-radius:5px;
}

.fill{
height:8px;
background:#22c55e;
width:50%;
border-radius:5px;
}


/* BLOQUE */

#block{

min-height:150px;
font-size:24px;
margin:10px;

}


/* CIRCULO */

#breath-circle{

width:150px;
height:150px;
border-radius:50%;

background:#00bfff;

margin:10px auto;

transition:transform 1s linear;

}


/* BOTONES */

button{

width:100%;
padding:15px;
margin:5px;

font-size:18px;

border:none;
border-radius:10px;

background:#2563eb;
color:white;

}

.secondary{

background:#374151;

}


/* RESPONSIVE */

@media(max-width:480px){

#app{
width:100%;
border-radius:0;
}

#block{
font-size:26px;
}

}

</style>

</head>



<body>


<div id="app">

<div id="logo">MayKaMi</div>

<div id="subtitle">
Entrenamiento mental diario
</div>

<div id="session-label">
Esperando sesión
</div>

<div id="timer">
00:00
</div>


<div id="mental-panel">

Disciplina
<div class="bar">
<div id="disciplina" class="fill"></div>
</div>

Claridad
<div class="bar">
<div id="claridad" class="fill"></div>
</div>

Calma
<div class="bar">
<div id="calma" class="fill"></div>
</div>

</div>



<div id="block">
Bienvenido
</div>

<div id="breath-circle"></div>


<button id="start-btn">
Iniciar sesión
</button>

<button id="next-btn" style="display:none;">
Siguiente
</button>

<button id="back-btn">
Atrás
</button>

<button id="restart-btn"
class="secondary">
Reiniciar
</button>


</div>


<script src="/static/scripts.js"></script>

</body>
</html>

<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYKAMI NeuroGame Engine</title>

    <style>
        body {
            margin: 0;
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* ===== FONDO ===== */
        #visual-gallery {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 2s;
            background-size: cover;
            background-position: center;
        }

        .slide.active {
            opacity: 0.5;
        }

        /* ===== CONTENIDO ===== */
        #ui {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-align: center;
            padding-top: 40px;
            padding-bottom: 120px; /* 🔥 espacio para botones */
        }

        /* ===== CÍRCULO ===== */
        #visual-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #60a5fa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            margin-bottom: 20px;
            transition: all 1s ease-in-out;
        }

        .inhale { transform: scale(1.4); background: rgba(96,165,250,0.2); }
        .exhale { transform: scale(0.8); background: rgba(239,68,68,0.2); }
        .hold { transform: scale(1.1); background: rgba(245,158,11,0.2); }

        /* ===== TEXTO ===== */
        #block {
            width: 90%;
            max-width: 600px;
            font-size: 1.4rem;
            line-height: 1.5;
            min-height: 120px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
            word-wrap: break-word;
        }

        /* ===== BOTONES FIJOS (CLAVE) ===== */
        #controls {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.95);
            padding: 10px;
            display: flex;
            gap: 6px;
            z-index: 9999;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 0.95rem;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.96);
            background: #1d4ed8;
        }

        /* ===== MOBILE EXTRA ===== */
        @media (max-width: 600px) {
            #visual-circle {
                width: 150px;
                height: 150px;
                font-size: 1.2rem;
            }

            #block {
                font-size: 1.2rem;
            }

            button {
                padding: 12px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>

<!-- FONDO -->
<div id="visual-gallery"></div>

<!-- UI -->
<div id="ui">

    <div id="visual-circle">MAYKAMI</div>

    <div id="block">Listo para iniciar sesión</div>

</div>

<!-- 🔥 CONTROLES FIJOS -->
<div id="controls">
    <button id="start-btn">Comenzar</button>
    <button id="back-btn">Atrás</button>
    <button id="next-btn">Siguiente</button>
    <button id="restart-btn">Reiniciar</button>
</div>

<script src="/static/scripts.js"></script>

</body>
</html>

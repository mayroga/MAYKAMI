<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MAYKAMI NeuroGame Engine</title>

<style>
/* ================= BASE ================= */

body {
    margin: 0;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

/* ================= GALERÍA ================= */

#visual-gallery {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 2s;
    background-size: cover;
    background-position: center;
}

.slide.active {
    opacity: 0.4;
}

/* ================= UI ================= */

#ui {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 80px; /* 🔥 espacio para botones */
    
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* ================= CÍRCULO ================= */

#visual-circle {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 4px solid #60a5fa;
    
    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 1.4rem;
    margin-bottom: 20px;

    transition: all 1s ease;
}

.inhale {
    transform: scale(1.4);
    background: rgba(96,165,250,0.2);
}

.exhale {
    transform: scale(0.7);
    background: rgba(239,68,68,0.2);
}

.hold {
    transform: scale(1.1);
    background: rgba(245,158,11,0.2);
}

/* ================= TEXTO ================= */

#block {
    width: 90%;
    max-width: 700px;
    height: 180px;

    overflow-y: auto; /* 🔥 SCROLL CONTROLADO */

    font-size: 1.3rem;
    text-align: center;

    padding: 10px;

    text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
}

/* ================= CONTROLES FIJOS ================= */

.controls {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    
    display: flex;
    justify-content: space-around;
    align-items: center;

    background: rgba(0,0,0,0.8);
    padding: 10px;

    z-index: 999;
}

/* ================= BOTONES ================= */

button {
    flex: 1;
    margin: 5px;
    padding: 12px;

    border: none;
    border-radius: 8px;

    background: #2563eb;
    color: white;

    font-size: 1rem;

    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

/* ================= MOBILE EXTRA ================= */

@media (max-width: 600px) {

    #visual-circle {
        width: 140px;
        height: 140px;
        font-size: 1.1rem;
    }

    #block {
        height: 150px;
        font-size: 1.1rem;
    }

    button {
        font-size: 0.9rem;
        padding: 10px;
    }
}

</style>
</head>

<body>

<div id="visual-gallery"></div>

<div id="ui">

    <div id="visual-circle">MAYKAMI</div>

    <div id="block">Listo para iniciar sesión</div>

</div>

<!-- 🔥 BOTONES SIEMPRE VISIBLES -->
<div class="controls">
    <button id="start-btn">Iniciar</button>
    <button id="back-btn">Atrás</button>
    <button id="next-btn">Siguiente</button>
    <button id="restart-btn">Reiniciar</button>
</div>

<script src="/static/scripts.js"></script>

</body>
</html>

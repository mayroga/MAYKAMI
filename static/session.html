<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYKAMI NeuroGame</title>

    <link rel="stylesheet" href="/static/style.css">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        #visual-gallery {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 2s;
            background-size: cover;
            background-position: center;
        }

        .slide.active {
            opacity: 0.6;
        }

        #ui-container {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #visual-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid #60a5fa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            transition: all 1s ease;
        }

        .inhale {
            transform: scale(1.4);
            background: rgba(96, 165, 250, 0.25);
        }

        .exhale {
            transform: scale(0.8);
            background: rgba(239, 68, 68, 0.25);
        }

        .hold {
            transform: scale(1.1);
            background: rgba(245, 158, 11, 0.25);
        }

        #block {
            max-width: 80%;
            font-size: 1.8rem;
            min-height: 150px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .controls {
            margin-top: 2rem;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            margin: 0 10px;
            background: #3b82f6;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background: #2563eb;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <!-- Fondo visual -->
    <div id="visual-gallery"></div>

    <!-- UI principal -->
    <div id="ui-container">

        <!-- CÍRCULO RESPIRACIÓN -->
        <div id="visual-circle">MAYKAMI</div>

        <!-- BLOQUE DE TEXTO -->
        <div id="block">Bienvenido a la Asesoría NeuroGame</div>

        <!-- CONTROLES -->
        <div class="controls">
            <button id="start-btn">Comenzar Sesión</button>
            <button id="back-btn" style="display:none;">Anterior</button>
            <button id="next-btn" style="display:none;">Siguiente</button>
            <button id="restart-btn" style="display:none;">Reiniciar</button>
        </div>

    </div>

    <!-- AUDIO RELAJANTE SUAVE (CAMBIADO) -->
    <audio id="nature-audio" loop>
        <!-- sonido más suave tipo ambiente / meditación -->
        <source src="https://cdn.pixabay.com/audio/2022/10/16/audio_12b6b1d6f5.mp3" type="audio/mpeg">
    </audio>

    <!-- SCRIPT -->
    <script src="/static/scripts.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYKAMI NeuroGame Engine V4</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
        }

        #visual-gallery {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 2s;
            background-size: cover;
            background-position: center;
        }

        .slide.active {
            opacity: 0.5;
        }

        #ui {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #visual-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid #60a5fa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            transition: all 0.8s ease;
        }

        .inhale { transform: scale(1.4); background: rgba(96,165,250,0.2); }
        .exhale { transform: scale(0.8); background: rgba(239,68,68,0.2); }
        .hold { transform: scale(1.1); background: rgba(245,158,11,0.2); }

        #block {
            max-width: 80%;
            font-size: 1.6rem;
            min-height: 150px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .controls {
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

<div id="visual-gallery"></div>

<div id="ui">

    <div id="visual-circle">MAYKAMI</div>

    <div id="block">Listo para iniciar sesión</div>

    <div class="controls">
        <button id="start-btn">Comenzar</button>
        <button id="back-btn" style="display:none;">Anterior</button>
        <button id="next-btn" style="display:none;">Siguiente</button>
        <button id="restart-btn" style="display:none;">Reiniciar</button>
    </div>

</div>

<script src="/static/scripts.js"></script>

</body>
</html>
